<section class="cart-section">

```
<h1>🛒 Shopping Cart</h1>

<div class="cart-layout">

    <div id="cart-items"></div>

    <div class="order-summary">

        <h2>Order Summary</h2>

        <h3 id="total">Total: ₹0</h3>

        <a href="checkout.html" class="checkout-btn">
            Proceed to Checkout
        </a>

    </div>

</div>
```

</section>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;
let html = "";

cart.forEach(item => {

    total += item.price;

    html += `
    <div class="cart-card">

        <img src="${item.image || 'images/noimage.jpg'}"
             class="cart-image"
             alt="${item.name}">

        <div class="cart-details">

            <h3>${item.name}</h3>

            <p>Premium Aquarium Product</p>

            <p class="cart-price">₹${item.price}</p>

            <div class="qty-box">
                <button>-</button>
                <span>1</span>
                <button>+</button>
            </div>

        </div>

    </div>
    `;
});

if(cart.length === 0){
    html = `
    <div class="cart-card">
        <h3>Your cart is empty.</h3>
    </div>
    `;
}

document.getElementById("cart-items").innerHTML = html;

document.getElementById("total").innerText =
"Total: ₹" + total;

</script>
